# ============================================================================
# cv.yaml — career timeline. Merges the same-shape sections that share the
# identical entry model and the same consumers (web homepage #experience /
# #education / #teaching / #activities Timeline + the Typst CV/resume).
# Splitting them across files was over-fragmentation; one file with the
# sections is one mental document ("my career") + one schema + one git history.
#
# Entry model (identical for every section):
#   { period, title, location?, body(markdown), more?(markdown), only?/except? }
#
# `more` — CV/web-only detail the resume OMITS (plan §4.4/§4.5 vs §5.4/§5.6): a
# 2nd experience bullet, an M.Eng advisor line, military service. lib.typ's
# cv-entry renders `more` only when doc != "resume"; the web Timeline renders
# body+more (web mirrors the FULL CV, never the compact resume). Use it to keep
# the one-page resume dense-with-whitespace while the CV carries the full record.
#
# Per-entry targeting (graphics / ml-systems PDF variants), honored by BOTH the
# Typst CV/resume AND the web homepage. The web is the untargeted/default view,
# so it mirrors the default CV (target=""):
#   only:   [graphics]      # show ONLY in the graphics PDF; hidden on web + default CV
#   except: [ml-systems]    # show everywhere EXCEPT the ml-systems PDF (incl. web)
# Both accept a single string or a list. Omit both → show everywhere.
#
# Periods use an en-dash + "Present" (plan §6); the Typst format-period helper
# leaves en-dash input untouched, and the web renders the period verbatim, so
# both surfaces agree.
#
# Validated at build time by src/lib/content-schema.ts (timelineEntry schema).
# ============================================================================

