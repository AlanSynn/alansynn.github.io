# ============================================================================
# cv.yaml — career timeline. Merges the four same-shape sections that share the
# identical entry model and the same consumers (web homepage #experience /
# #education / #teaching / #activities Timeline + the Typst CV/resume).
# Splitting them across four files was over-fragmentation; one file with four
# sections is one mental document ("my career") + one schema + one git history.
#
# Entry model (identical for every section):
#   { period, title, location?, body(markdown), only?/except? }
#
# Per-entry targeting for PDF variants (graphics / ml-systems):
#   only:   [graphics]      # show only for these targets
#   except: [ml-systems]    # hide for these targets
# Both `only` and `except` accept a single string or a list. Omitting both
# means the entry shows everywhere (default).
#
# Validated at build time by src/lib/content-schema.ts (timelineEntry schema).
# ============================================================================

