# ============================================================================
# News — short, dated items shown on the homepage News section.
#
# One file, one list. Add a new item at the top (newest first is easiest to
# read, though the homepage sorts by `date` regardless). The homepage shows the
# 8 most recent; older items naturally age off the page but stay here as a
# running log.
#
# Item fields:
#   date:        YYYY-MM-DD (required). Timezone-naive; rendered as month+year.
#   link:        URL shown as a ↗ icon after the body (optional).
#   highlight:   true flags the item for emphasis styling (optional, default false).
#   body:        One full sentence, markdown inline OK (**bold**, _italic_,
#                [label](url)). Sized to fill the column width.
#
# Bodies are single-quoted YAML. If a body contains an apostrophe ('), double
# it inside the quotes — e.g. body: 'Alan''s paper was accepted.'
# ===========================================================================

