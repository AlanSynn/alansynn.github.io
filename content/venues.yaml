# ============================================================================
# Venue badges: abbr → { name, url, type }. Keys match `abbr` in papers.bib.
#   name = readable badge label (fuller than the abbr; shown on the web).
#   url  = venue homepage (badge links here).
#   type = journal | conference | preprint. Drives the CV's publication
#          grouping (Refereed Journals / Conferences / Preprints). The PDF
#          classifies from this field and falls back to a string heuristic
#          only when it is absent.
# (Per-venue color was retired when publication labels were unified to the
# accent color — kept out to avoid a field with no consumer.)
# ============================================================================

'CHI':
  name: 'ACM CHI'
  url: 'https://chi2026.acm.org/'
  type: conference

