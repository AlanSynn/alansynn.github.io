# ============================================================================
# Venue badges: abbr → { name, url, type }. Keys match `abbr` in papers.bib.
#   name = readable badge label (fuller than the abbr; shown on the web).
#   url  = venue homepage (badge links here).
#   type = journal | conference | preprint. Drives the CV's publication
#          grouping (Refereed Journals / Conferences / Preprints). The PDF
#          classifies from this field and falls back to a string heuristic
#          only when it is absent.
# (Per-venue color was retired when publication labels were unified to the
# accent color — kept out to avoid a field with no consumer.)
# ============================================================================

'CHI':
  name: 'ACM CHI'
  url: 'https://sigchi.org/'
  type: conference

'IEEE Access':
  name: 'IEEE Access'
  url: 'https://ieeeaccess.ieee.org/'
  type: journal

'NeurIPS':
  name: 'NeurIPS'
  url: 'https://neurips.cc/'
  type: conference

# NeurIPS Demonstrations track — peer-reviewed but a non-archival demo/exhibit,
# NOT a main-track NeurIPS paper. Distinct key + name so the badge honestly
# reads "NeurIPS Demonstrations" (never bare "NeurIPS"). type: conference sorts
# it among conference papers on the CV, where the badge carries the truth.
'NeurIPS-Demo':
  name: 'NeurIPS Demonstrations'
  url: 'https://neurips.cc/'
  type: conference

'arXiv':
  name: 'arXiv'
  url: 'https://arxiv.org/'
  type: preprint

'ACK':
  name: 'KIPS Conf.'
  url: 'https://www.kips.or.kr/'
  type: conference

'KIPS':
  name: 'KIPS'
  url: 'https://www.kips.or.kr/'
  type: conference

'TKIPS':
  name: 'KIPS Transactions'
  url: 'https://tkips.kips.or.kr/'
  type: journal

'KTSDE':
  name: 'KIPS Trans. Softw. & data'
  url: 'https://www.kips.or.kr/'
  type: journal

# SIGGRAPH papers publish in ACM Transactions on Graphics (TOG) — a journal,
# so type: journal drives correct CV grouping even though the venue is a conf.
'SIGGRAPH':
  name: 'ACM SIGGRAPH'
  url: 'https://www.siggraph.org/'
  type: journal
