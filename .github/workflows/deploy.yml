name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel a run already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build (Astro + Pagefind)
        run: bun run build

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      # CSS-isolation guard: the academic /projects/<slug> route split is
      # load-bearing (keeps site base.css out of the microsite). Asserts no site
      # stylesheet leaks into it, in light + dark, on the built site.
      - name: CSS-isolation guard
        run: |
          bun run preview &
          SERVER_PID=$!
          for i in $(seq 1 40); do curl -sSf http://localhost:4321/ >/dev/null 2>&1 && break || sleep 0.5; done
          node scripts/check-isolation.mjs
          kill $SERVER_PID 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
