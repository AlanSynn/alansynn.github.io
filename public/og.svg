<?xml version="1.0" encoding="UTF-8"?>
<!--
  Site-default Open Graph image (1200x630). A frozen IK frame of the two mechanism
  motifs: ARM rising flush from the bottom edge, LEGS hanging flush from the top
  edge — upright rest pose with the joints IK-bent so the hand and the feet reach
  toward the center and almost touch (cursor-dragged-to-center, stopped mid-reach).
  Generated by scripts/gen-og-svg.mjs (same IK as src/lib/ik.ts). Crawlers don't
  render SVG → rasterized to og.png by rsvg-convert. Edit the script, not this file.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" color="#1d4e89">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d4e89" stroke-width="1" stroke-opacity="0.12" />
    </pattern>
  </defs>

  <style>
    .ra-link, .rl-link { stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; fill: none; }
    .ra-tendon, .rl-tendon { stroke: currentColor; stroke-width: 0.85; stroke-linecap: round; stroke-dasharray: 2 3; fill: none; opacity: 0.5; }
    .ra-joint, .ra-knuckle, .rl-joint, .rl-pelvis-dot, .rl-heel { fill: currentColor; }
    .ra-tip { fill: rgba(29,78,137,0.18); stroke: currentColor; stroke-width: 1; }
    .ra-mount { stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; fill: rgba(29,78,137,0.18); opacity: 0.75; }
    .ra-palm { fill: rgba(29,78,137,0.18); stroke: currentColor; stroke-width: 1.6; stroke-linejoin: round; opacity: 0.85; }
    .rl-pelvis { fill: rgba(29,78,137,0.18); stroke: currentColor; stroke-width: 1.6; stroke-linejoin: round; }
    .rl-foot { fill: rgba(29,78,137,0.18); stroke: currentColor; stroke-width: 1.3; stroke-linejoin: round; }
  </style>

  <rect width="1200" height="630" fill="#ffffff" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- ARM: base flush at the bottom edge, upright, IK-bent reaching up to center. -->
  <g transform="translate(60.00 -56.00) scale(2)">
    <line class="ra-mount" x1="56" y1="346" x2="124" y2="346" />
    <line class="ra-mount" x1="72" y1="340" x2="108" y2="340" />
    <rect class="ra-mount" x="84" y="337" width="12" height="9" rx="1.5" />
    <g class="j-shoulder" transform="rotate(10.56 90 340)">
      <line class="ra-link" x1="90" y1="340" x2="90" y2="245" />
      <line class="ra-tendon" x1="86" y1="334" x2="86" y2="251" />
      <line class="ra-tendon" x1="94" y1="334" x2="94" y2="251" />
      <circle class="ra-joint" cx="90" cy="340" r="4.4" />
      <circle class="ra-joint" cx="90" cy="245" r="3.8" />
      <g class="j-elbow" transform="rotate(62.00 90 245)">
        <line class="ra-link" x1="90" y1="245" x2="90" y2="157" />
        <line class="ra-tendon" x1="86" y1="239" x2="86" y2="163" />
        <line class="ra-tendon" x1="94" y1="239" x2="94" y2="163" />
        <circle class="ra-joint" cx="90" cy="157" r="3.6" />
        <g class="j-wrist" transform="rotate(-38.18 90 157)">
          <g class="hand">
            <path class="ra-palm" d="M 70 158 Q 68 148 78 146 L 100 145 Q 112 147 114 158 Q 92 163 70 158 Z" />
            <g class="f-t"><g class="j-mcp" transform="rotate(-29.00 78 150)"><line class="ra-link" x1="78" y1="150" x2="78" y2="138" /><circle class="ra-knuckle" cx="78" cy="150" r="2.4" /><g class="j-pip" transform="rotate(8.00 78 138)"><line class="ra-link" x1="78" y1="138" x2="78" y2="128" /><circle class="ra-joint" cx="78" cy="138" r="2.1" /><g class="j-dip" transform="rotate(6.00 78 128)"><line class="ra-link" x1="78" y1="128" x2="78" y2="120" /><circle class="ra-tip" cx="78" cy="120" r="2.1" /></g></g></g></g>
            <g class="f-i"><g class="j-mcp" transform="rotate(-4.50 88 146)"><line class="ra-link" x1="88" y1="146" x2="88" y2="132" /><circle class="ra-knuckle" cx="88" cy="146" r="2.4" /><g class="j-pip" transform="rotate(30.20 88 132)"><line class="ra-link" x1="88" y1="132" x2="88" y2="120" /><circle class="ra-joint" cx="88" cy="132" r="2.1" /><g class="j-dip" transform="rotate(21.60 88 120)"><line class="ra-link" x1="88" y1="120" x2="88" y2="111" /><circle class="ra-tip" cx="88" cy="111" r="2.1" /></g></g></g></g>
            <g class="f-m"><g class="j-mcp" transform="rotate(9.75 98 145)"><line class="ra-link" x1="98" y1="145" x2="98" y2="130" /><circle class="ra-knuckle" cx="98" cy="145" r="2.4" /><g class="j-pip" transform="rotate(56.10 98 130)"><line class="ra-link" x1="98" y1="130" x2="98" y2="118" /><circle class="ra-joint" cx="98" cy="130" r="2.1" /><g class="j-dip" transform="rotate(39.80 98 118)"><line class="ra-link" x1="98" y1="118" x2="98" y2="108" /><circle class="ra-tip" cx="98" cy="108" r="2.1" /></g></g></g></g>
            <g class="f-r"><g class="j-mcp" transform="rotate(24.00 108 147)"><line class="ra-link" x1="108" y1="147" x2="108" y2="133" /><circle class="ra-knuckle" cx="108" cy="147" r="2.4" /><g class="j-pip" transform="rotate(82.00 108 133)"><line class="ra-link" x1="108" y1="133" x2="108" y2="122" /><circle class="ra-joint" cx="108" cy="133" r="2.1" /><g class="j-dip" transform="rotate(58.00 108 122)"><line class="ra-link" x1="108" y1="122" x2="108" y2="113" /><circle class="ra-tip" cx="108" cy="113" r="2.1" /></g></g></g></g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- LEGS: pelvis flush at the top edge, upright, IK-bent reaching down to center. -->
  <g transform="translate(806.00 -12.60) scale(2.2)">
    <path class="rl-pelvis" d="M 32 10 Q 32 3 39 3 L 101 3 Q 108 3 108 10 Q 108 17 101 17 L 39 17 Q 32 17 32 10 Z" />
    <circle class="rl-pelvis-dot" cx="70" cy="10" r="2.6" />
    <g class="leg">
      <g class="j-hip" transform="rotate(22.92 50 10)">
        <line class="rl-link" x1="50" y1="10" x2="50" y2="102" />
        <line class="rl-tendon" x1="46.5" y1="14" x2="46.5" y2="98" />
        <line class="rl-tendon" x1="53.5" y1="14" x2="53.5" y2="98" />
        <circle class="rl-joint" cx="50" cy="10" r="4.4" />
        <g class="j-knee" transform="rotate(30.06 50 102)">
          <line class="rl-link" x1="50" y1="102" x2="50" y2="188" />
          <line class="rl-tendon" x1="46.5" y1="106" x2="46.5" y2="184" />
          <line class="rl-tendon" x1="53.5" y1="106" x2="53.5" y2="184" />
          <circle class="rl-joint" cx="50" cy="102" r="3.8" />
          <g class="j-ankle" transform="rotate(-57.56 50 188)">
            <path class="rl-foot" d="M 47 188 L 46 196 Q 46 206 50 208 Q 54 206 54 196 L 53 188 Z" />
            <circle class="rl-heel" cx="50" cy="203" r="1.5" />
          </g>
        </g>
      </g>
    </g>
    <g class="leg">
      <g class="j-hip" transform="rotate(18.31 90 10)">
        <line class="rl-link" x1="90" y1="10" x2="90" y2="102" />
        <line class="rl-tendon" x1="86.5" y1="14" x2="86.5" y2="98" />
        <line class="rl-tendon" x1="93.5" y1="14" x2="93.5" y2="98" />
        <circle class="rl-joint" cx="90" cy="10" r="4.4" />
        <g class="j-knee" transform="rotate(56.95 90 102)">
          <line class="rl-link" x1="90" y1="102" x2="90" y2="188" />
          <line class="rl-tendon" x1="86.5" y1="106" x2="86.5" y2="184" />
          <line class="rl-tendon" x1="93.5" y1="106" x2="93.5" y2="184" />
          <circle class="rl-joint" cx="90" cy="102" r="3.8" />
          <g class="j-ankle" transform="rotate(-72.40 90 188)">
            <path class="rl-foot" d="M 87 188 L 86 196 Q 86 206 90 208 Q 94 206 94 196 L 93 188 Z" />
            <circle class="rl-heel" cx="90" cy="203" r="1.5" />
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
