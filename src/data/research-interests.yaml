# ============================================================================
# Research interests. Motion-first; HCI × graphics; spectrum framing.
# ============================================================================

statements:
  - >-
    I study **motion** across a spectrum, from how people make it by hand to
    how it's generated by models. My home is between **HCI and computer
    graphics**: participatory design and learning on one end, motion
    synthesis, world models, and vision-language-action on the other. Motion
    is what the whole spectrum shares.
  - >-
    What I care about is the breadth itself: connecting the human side of
    motion to its graphics and generative side, more than any single project
    or method.

focus_areas:
  - Computer Graphics
  - HCI
  - Computational Design
  - Motion Synthesis
  - ML Systems
