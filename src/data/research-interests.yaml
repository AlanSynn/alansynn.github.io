# ============================================================================
# Research interests. Concrete, artifact-first (MotionSmith) for scanners.
# ============================================================================

statements:
  - >-
    I build design tools that turn a maker's sketch into a working, fabricable
    automaton, most recently *MotionSmith* (CHI 2026). My research spans
    **computer graphics**, **motion synthesis**, and **computational design**,
    with a focus on preserving creative intent in generative systems.
  - >-
    I also bring eight years of production systems experience, distributed
    training, ML infrastructure, and cloud-native platforms, so I can take a
    graphics idea from model to deployable system.

focus_areas:
  - Computer Graphics
  - Motion Synthesis
  - Computational Design
  - ML Systems
  - Production Engineering
  - Robotics / Embedded
