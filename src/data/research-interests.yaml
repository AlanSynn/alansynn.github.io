# ============================================================================
# Research interests. Concrete, artifact-first (MotionSmith) for scanners.
# ============================================================================

statements:
  - >-
    My research explores **computational design and creativity**, with a focus
    on representing and supporting creative intent in generative and
    interactive systems. I build models and interfaces that translate
    high-level human intent into expressive, controllable outcomes, spanning
    **computer graphics**, **motion synthesis**, **AI**, and **HCI**.
  - >-
    I also bring eight years of production systems experience (distributed
    training, ML infrastructure, cloud-native platforms), which lets me take a
    graphics or HCI idea from model to deployable system.

focus_areas:
  - Computer Graphics
  - Motion Synthesis
  - Computational Design
  - ML Systems
  - Production Engineering
  - Robotics / Embedded
