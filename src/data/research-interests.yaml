# ============================================================================
# Research interests. Graphics-forward primary identity + a visible systems
# thread (the ML-systems research + production-engineering depth is a strength).
# ============================================================================

statements:
  - >-
    My research explores *computational design and creativity*, with a focus on
    representing and supporting creative intent in generative and interactive
    systems. I build models and interfaces that translate high-level human
    intent into expressive, controllable outcomes, spanning **computer
    graphics**, **motion synthesis**, and **kinematic design**.
  - >-
    I also bring a systems-research and engineering background: distributed
    training systems, ML infrastructure (privacy-preserving inference, model
    compression), and production software from social robotics to cloud-native
    platforms. This depth lets me take a graphics or HCI idea from model to
    deployable system, not just a demo.

focus_areas:
  - Computer Graphics
  - Motion Synthesis
  - Computational Design
  - ML Systems
  - Production Engineering
  - Robotics / Embedded
