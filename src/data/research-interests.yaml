statements:
  - >-
    I build tools that help people design and make things that move. My
    research brings together **computer graphics**, **HCI**, and
    **computational design** to turn a sketch of the motion you want into
    working gears, cams, and linkages, ready to cut and assemble. Before my
    PhD I spent eight years shipping production systems, from distributed
    machine-learning infrastructure and game backends to the embedded systems
    behind a social robot.
  - >-
    That engineering experience grounds how I build: I can take a graphics or
    HCI idea from model to deployable system, not just a demo.

focus_areas:
  - Computer Graphics
  - HCI
  - Computational Design
  - Motion Synthesis
  - ML Systems
