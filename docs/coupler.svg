<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 104" fill="none" role="img" aria-label="Four-bar coupler curve — the site's kinematics motif">
  <g stroke="#1d4e89" stroke-linecap="round">
    <!-- input crank + output rocker (ground pivot → coupler endpoint) -->
    <line x1="8" y1="90" x2="40" y2="60" stroke-width="1.7"/>
    <line x1="232" y1="90" x2="208" y2="46" stroke-width="1.7"/>
    <!-- the moving coupler bar linking both endpoints -->
    <line x1="40" y1="60" x2="208" y2="46" stroke-width="1.1" stroke-dasharray="2 3" opacity="0.6"/>
    <!-- fixed ground mounts: hatched = pinned to ground -->
    <line x1="2" y1="95" x2="6" y2="101" stroke-width="0.9" opacity="0.7"/>
    <line x1="6" y1="95" x2="10" y2="101" stroke-width="0.9" opacity="0.7"/>
    <line x1="10" y1="95" x2="14" y2="101" stroke-width="0.9" opacity="0.7"/>
    <line x1="226" y1="95" x2="230" y2="101" stroke-width="0.9" opacity="0.7"/>
    <line x1="230" y1="95" x2="234" y2="101" stroke-width="0.9" opacity="0.7"/>
    <line x1="234" y1="95" x2="238" y2="101" stroke-width="0.9" opacity="0.7"/>
  </g>
  <g fill="#1d4e89">
    <circle cx="8" cy="90" r="3"/>
    <circle cx="232" cy="90" r="3"/>
  </g>
  <!-- the traced coupler curve (path of a point on the coupler) -->
  <path d="M 40 60 C 18 34 52 14 98 20 C 142 26 198 10 208 46 C 215 70 176 80 138 71 C 102 62 80 86 60 77 C 50 73 42 68 40 60 Z" stroke="#1d4e89" stroke-width="1.7" stroke-linejoin="round"/>
  <!-- node riding the curve -->
  <circle cx="98" cy="20" r="3.5" fill="#1d4e89"/>
</svg>
